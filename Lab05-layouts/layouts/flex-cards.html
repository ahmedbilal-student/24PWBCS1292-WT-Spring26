<!DOCTYPE html>
<html>
<head>

<title>Flex Cards</title>

<style>

body{font-family:Arial;background:#f5f5f5}

.container{
display:flex;
flex-wrap:wrap;
gap:20px;
padding:30px
}

.card{
flex:1 1 200px;
background:white;
padding:20px;
box-shadow:0 2px 6px gray
}

</style>
</head>

<body>

<h2 style="text-align:center">Flexbox Cards</h2>

<div class="container">

<div class="card">Card 1</div>
<div class="card">Card 2</div>
<div class="card">Card 3</div>

</div>

</body>
</html>
