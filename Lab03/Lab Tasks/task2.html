<!DOCTYPE html>
<html>
<head>

<title>Task 2</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto&family=Pacifico&family=Playfair+Display&display=swap" rel="stylesheet">

<style>

body{
font-family:Arial;
padding:20px;
}

h1{
text-align:center;
}

.font1{
font-family:Roboto;
font-size:40px;
}

.font2{
font-family:Pacifico;
font-size:2em;
}

.font3{
font-family:Playfair Display;
font-size:120%;
}

.center{
text-align:center;
}

.upper{
text-transform:uppercase;
}

.shadow{
text-shadow:3px 3px 5px gray;
}

</style>

</head>

<body>

<h1>Typography Showcase</h1>

<p class="font1">Roboto Font Example</p>

<p class="font2">Pacifico Font Example</p>

<p class="font3 shadow">Playfair Display Example</p>

<p class="center">Center Aligned Text</p>

<p class="upper">uppercase text example</p>

</body>
</html>
