<!DOCTYPE html>
<html>
<head>

<title>Task 9</title>

<style>

.box{
width:120px;
height:120px;
background:orange;
display:inline-block;
margin:20px;
transition:0.5s;
}

.rotate:hover{
transform:rotate(45deg);
}

.scale:hover{
transform:scale(1.5);
}

.move:hover{
transform:translate(50px);
}

.skew:hover{
transform:skew(20deg);
}

</style>

</head>

<body>

<div class="box rotate"></div>
<div class="box scale"></div>
<div class="box move"></div>
<div class="box skew"></div>

</body>
</html>
