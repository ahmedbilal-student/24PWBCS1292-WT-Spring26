<!DOCTYPE html>
<html>
<head>

<style>

a:hover{
color:red;
}

input:focus{
border:2px solid green;
}

li:first-child{
color:blue;
}

li:last-child{
color:red;
}

li:nth-child(2){
color:green;
}

</style>

</head>

<body>

<a href="#">Hover me</a>

<br><br>

<input type="text" placeholder="Click here">

<ul>
<li>Item 1</li>
<li>Item 2</li>
<li>Item 3</li>
</ul>

</body>
</html>
