<!DOCTYPE html>
<html>
<head>
<title>Exercise 4</title>

<style>

div p{
color:blue;
}

div > p{
font-weight:bold;
}

h1 + p{
color:green;
}

h1 ~ p{
font-style:italic;
}

</style>

</head>

<body>

<div>
<p>Child paragraph</p>
</div>

<h1>Heading</h1>
<p>Adjacent paragraph</p>
<p>General sibling paragraph</p>

</body>
</html>
